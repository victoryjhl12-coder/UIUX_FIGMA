<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test 오답노트</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nomal.css">

</head>
<body>
    <!-- 시멘틱 구조/ 가이드 (길 안내) -->
    <header>상단바</header>
    <main>
        <section class="bestsellers-section">
            <!-- ul.nav/섹션 안에 상단 부분 -->
             <div class="ul-nav">
                <div class="section-title">bestsellers</div>
                <div class="view-all">view-all</div>
             </div>
             <!-- div. amp_swiper / 섹션안에 하단 부분-->
              <div class="amp-swiper">
                <div class="best-product-list best-product-list01">
                    <div class="best-img-box">
                        <img src="#" alt="향수 이미지">
                    </div>
                    <!-- p태그: 문단 태그 앵커태그: 링크 연결 -->
                    <!-- 클래스명은 알아보기 편하게 직관적으로 작성 -->
                    <p class="best-discount-title">Niacinamide 10% + Zinc 1%</p>
                    <p class="best-discount-subhead">Oil Control, Brightens, Smooths </p>
                    <div class="best-price-capacity">
                        <!-- 젠코딩 a*2 탭 하면 생성 -->
                        <a class="best-price" href="#">₩8700 KRW</a>
                        <a class="best-capacity" href="#">
                            <span class="best-capacity-30ml">30ml</span>
                            <span class="best-capacity-60ml">60ml</span>
                        </a>
                    </div>
                    <button type="button" class="best-pro-btn">Add to Cart</button>
                </div>
                <div class="best-product-list best-product-list02">box02</div>
                <div class="best-product-list best-product-list03">box03</div>
                <div class="best-product-list best-product-list04">box04</div>
              </div>
              
        </section>
    </main>
    <footer>하단바</footer>
</body>
</html>
