<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p태그, a태그, 버튼태그, img태그, hover, span 실습</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nomal.css"> 
</head>
<body>
    <!-- 시멘틱 구조 맞춰서 작성 -->
     <header>상단바</header>
     <main>
        <section class="bestellers-section">
            <!-- ul-nav 섹션 상단 부분 -->
            <div class="ul-nav">
                <div class="section-title">Besteellers</div>
                <div class="view-all">View All</div>
            </div>
            <!-- amp-swiper 베스트셀러 섹션 아래 상품 리스트 -->
             <div class="amp-swiper">
                 <div class="best-product-list01">
                    <div class="product-img">
                        <img src="#" alt="상품 이미지">
                        <!-- 이미지 태그 src= 링크, alt= 는 꼭 작성해야함 -->
                    </div>
                    <!-- p 태그는 문단 태그 -->
                     <p class="best-discount-title">Niacinamide 10% + Zinc 1%</p>
                     <p class="best-discount-subhead">Oil Control, Brightens, Smooths</p>
                     <div class="best-price-capacity">
                        <!-- 젠코딩 a*2 탭 하면 생성 -->
                         <a href="best-price" href="#">₩8700 KRW</a>
                         <a href="best-capacity "href="">
                            <span class="best-capacity-30ml">30ml</span>
                            <span class="best-capacity-60ml">60ml</span>
                         </a>
                     </div>
                 </div>
                 <div class="best-product-list02">box02</div>
                 <div class="best-product-list03">box03</div>
                 <div class="best-product-list04">box04</div>
             </div>
        </section>
     </main>
     <footer>하단바</footer>
    
</body>
</html>
